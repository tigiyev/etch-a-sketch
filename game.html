<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Etch-a-Sketch</title>

	<link rel="stylesheet" href="game.css">
	<script src="game.js"></script>
</head>

<body>
	<div class="main">

		<div class="game">

			<div class="controls">
				<h1 class="indent-6">Etch-a-Sketch</h1>
				<h3 class="indent-1">Grid resolution</h3>
				<p class="indent-2 subtext">Number of squares per side. From 4 to 100.</p>
				<div>
					<input id="gridCount" type="number" value="32" min="4" max="100">
					<button id="updateGrid">Update grid</button>
				</div>
			</div>

			<div id="gameGrid" class="container"></div>
		</div>
	</div>
</body>

</html>
